<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 – Fan Poll</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --gold:#F5C518;--gold2:#C8960C;--green:#00C170;
  --dark:#07070F;--card:#111118;--card2:#16161F;
  --border:#252535;--text:#EEEEF8;--muted:#6868A0;
  --red:#E63946;--orange:#E85D04;--lime:#B5E61D;
  --pink:#FF69B4;--cyan:#00CED1;--purple:#9B59B6;
  --teal:#1ABC9C;--blue:#3498DB;
}

html{scroll-behavior:smooth;}
body{
  background:var(--dark);color:var(--text);
  font-family:'Inter',sans-serif;min-height:100vh;
  overflow-x:hidden;
}

/* ── PARTICLES CANVAS ── */
#canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── WRAPPER ── */
.page{position:relative;z-index:1;}

/* ── HEADER ── */
header{
  text-align:center;padding:56px 20px 36px;
  border-bottom:1px solid var(--border);
  animation:fadeDown .8s ease both;
}
.trophy-wrap{
  display:inline-block;font-size:56px;margin-bottom:10px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
header h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.2rem,7vw,4.5rem);
  letter-spacing:.07em;line-height:1;
  background:linear-gradient(135deg,#FFE066 0%,#F5C518 40%,#C8960C 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{
  margin-top:10px;color:var(--muted);font-size:.85rem;
  letter-spacing:.12em;text-transform:uppercase;
}
.pulse-dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--green);margin-right:6px;vertical-align:middle;
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.6);}}

/* ── MAIN ── */
main{max-width:760px;margin:0 auto;padding:40px 20px 80px;}

/* ── SCREEN TRANSITIONS ── */
.screen{animation:fadeUp .55s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px);}to{opacity:1;transform:translateY(0);}}

/* ── CARD ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:36px;
  box-shadow:0 0 60px rgba(0,0,0,.6);
}
.card h2{
  font-family:'Bebas Neue',sans-serif;font-size:1.7rem;
  letter-spacing:.06em;color:var(--gold);margin-bottom:28px;
}

/* ── NAME INPUTS ── */
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.field-wrap label{
  display:block;font-size:.72rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}
.field-wrap input{
  width:100%;background:#0C0C14;border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:'Inter',sans-serif;
  font-size:.95rem;padding:11px 15px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field-wrap input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(245,197,24,.1);
}

/* ── GROUPS LABEL ── */
.groups-label{
  font-size:.72rem;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:14px;
}

/* ── GROUPS GRID ── */
.groups-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:13px;margin-bottom:30px;
}
.group-block{
  background:#0C0C14;border:1px solid var(--border);
  border-radius:11px;overflow:hidden;
  transition:border-color .25s,transform .25s;
  animation:fadeUp .5s ease both;
}
.group-block:hover{border-color:#3A3A5A;transform:translateY(-2px);}
.group-header{
  padding:6px 14px;font-family:'Bebas Neue',sans-serif;
  font-size:1rem;letter-spacing:.1em;color:#0A0A0A;font-weight:700;
}
.team-option{
  display:flex;align-items:center;gap:10px;padding:9px 14px;
  cursor:pointer;border-top:1px solid var(--border);
  transition:background .15s;position:relative;overflow:hidden;
}
.team-option::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(245,197,24,.08),transparent);
  transform:translateX(-100%);transition:transform .3s;
}
.team-option:hover::before{transform:translateX(0);}
.team-option input[type="radio"]{display:none;}
.radio-dot{
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--border);flex-shrink:0;
  transition:border-color .2s,background .2s,transform .2s;
  display:flex;align-items:center;justify-content:center;
}
.team-option input:checked~.radio-dot{
  border-color:var(--gold);background:var(--gold);
  transform:scale(1.15);
}
.team-option input:checked~.radio-dot::after{
  content:'';width:5px;height:5px;border-radius:50%;background:#0A0A0A;
}
.team-flag{font-size:1.2rem;line-height:1;}
.team-name{font-size:.85rem;font-weight:500;color:var(--text);letter-spacing:.02em;}
.team-option.selected{background:rgba(245,197,24,.06);}
.team-option.selected .team-name{color:var(--gold);}

/* ── ERRORS ── */
.error-msg{
  background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.35);
  border-radius:8px;color:#FF8080;font-size:.85rem;
  padding:10px 14px;margin-bottom:18px;display:none;
  animation:shake .35s ease;
}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

/* ── SUBMIT BUTTON ── */
.btn-submit{
  width:100%;border:none;border-radius:11px;
  font-family:'Bebas Neue',sans-serif;font-size:1.35rem;
  letter-spacing:.1em;padding:17px;cursor:pointer;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#FFD700,#F5C518,#C8960C);
  color:#0A0A0A;transition:transform .15s,opacity .15s;
}
.btn-submit::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.25) 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .5s;
}
.btn-submit:hover::after{transform:translateX(100%);}
.btn-submit:hover{opacity:.93;transform:translateY(-2px);}
.btn-submit:active{transform:translateY(0);}

/* ── SUCCESS ── */
#success-screen{display:none;text-align:center;padding:60px 24px;}
.check-circle{
  width:90px;height:90px;border-radius:50%;
  background:rgba(0,193,112,.12);border:2px solid var(--green);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:40px;
  animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes popIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
#success-screen h2{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;
  letter-spacing:.06em;color:var(--green);margin-bottom:10px;
}
#success-screen p{color:var(--muted);font-size:.95rem;max-width:360px;margin:0 auto;}
.confetti-row{font-size:2rem;margin-bottom:14px;animation:bounce .6s ease both .3s;}
@keyframes bounce{0%{transform:scale(0) rotate(-20deg);}70%{transform:scale(1.15) rotate(5deg);}100%{transform:scale(1) rotate(0);}}

/* ── ADMIN ── */
.admin-toggle{margin-top:48px;text-align:center;}
.btn-ghost{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);font-family:'Inter',sans-serif;font-size:.75rem;
  letter-spacing:.06em;text-transform:uppercase;padding:8px 18px;
  cursor:pointer;transition:border-color .2s,color .2s;
}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}

#admin-panel{
  display:none;margin-top:16px;background:var(--card);
  border:1px solid var(--border);border-radius:16px;padding:28px;
  animation:fadeUp .35s ease;
}
#admin-panel h3{
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
  color:var(--gold);letter-spacing:.06em;margin-bottom:18px;
}
.admin-row{display:flex;gap:10px;align-items:center;}
#admin-pass{
  flex:1;background:#0C0C14;border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;
  font-size:.95rem;padding:10px 14px;outline:none;transition:border-color .2s;
}
#admin-pass:focus{border-color:var(--gold);}
.btn-admin{
  background:linear-gradient(135deg,#F5C518,#C8960C);color:#0A0A0A;
  border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;
  font-size:1.05rem;letter-spacing:.08em;padding:11px 20px;
  cursor:pointer;white-space:nowrap;transition:opacity .15s;
}
.btn-admin:hover{opacity:.88;}
.admin-error{color:#FF7070;font-size:.82rem;margin-top:8px;display:none;}
.vote-count{margin-top:14px;color:var(--muted);font-size:.85rem;}
.vote-count span{color:var(--gold);font-weight:700;}

/* ── RESET BUTTON ── */
.btn-reset{
  margin-top:10px;background:none;border:1px solid rgba(220,50,50,.35);
  border-radius:8px;color:#FF8080;font-family:'Inter',sans-serif;
  font-size:.78rem;letter-spacing:.05em;padding:7px 14px;
  cursor:pointer;transition:background .2s,border-color .2s;
}
.btn-reset:hover{background:rgba(220,50,50,.08);border-color:rgba(220,50,50,.6);}

/* ── GROUP COLORS ── */
.g-a{background:#E63946;}.g-b{background:#E85D04;}
.g-c{background:#F4A261;color:#111!important;}
.g-d{background:#2A9D8F;}.g-e{background:#6A0572;}
.g-f{background:#B5E61D;color:#111!important;}
.g-g{background:#FF69B4;color:#111!important;}
.g-h{background:#00CED1;color:#111!important;}
.g-i{background:#9B59B6;}.g-j{background:#1ABC9C;color:#111!important;}
.g-k{background:#E67E22;}.g-l{background:#3498DB;}

/* ── STAGGER ANIMATION DELAYS ── */
.group-block:nth-child(1){animation-delay:.05s}.group-block:nth-child(2){animation-delay:.10s}
.group-block:nth-child(3){animation-delay:.15s}.group-block:nth-child(4){animation-delay:.20s}
.group-block:nth-child(5){animation-delay:.25s}.group-block:nth-child(6){animation-delay:.30s}
.group-block:nth-child(7){animation-delay:.35s}.group-block:nth-child(8){animation-delay:.40s}
.group-block:nth-child(9){animation-delay:.45s}.group-block:nth-child(10){animation-delay:.50s}
.group-block:nth-child(11){animation-delay:.55s}.group-block:nth-child(12){animation-delay:.60s}

@media(max-width:520px){
  .name-row{grid-template-columns:1fr;}
  .card{padding:22px;}
  .groups-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="page">
  <header>
    <div class="trophy-wrap">🏆</div>
    <h1>FIFA World Cup 2026</h1>
    <p class="subtitle"><span class="pulse-dot"></span>Fan Team Poll — Cast Your Vote</p>
  </header>

  <main>
    <!-- POLL FORM -->
    <div class="screen" id="poll-screen">
      <div class="card">
        <h2>Who are you supporting?</h2>

        <div class="error-msg" id="err-fields">Please enter your first name, surname and select a team.</div>
        <div class="error-msg" id="err-duplicate">⚠️ This name has already voted. Each person can only vote once.</div>

        <div class="name-row">
          <div class="field-wrap">
            <label for="fan-firstname">First Name</label>
            <input type="text" id="fan-firstname" placeholder="e.g. John" autocomplete="off">
          </div>
          <div class="field-wrap">
            <label for="fan-surname">Surname</label>
            <input type="text" id="fan-surname" placeholder="e.g. Smith" autocomplete="off">
          </div>
        </div>

        <div class="groups-label">Select Your Team</div>
        <div class="groups-grid" id="groups-grid"></div>

        <button class="btn-submit" onclick="submitVote()">⚽ Submit My Vote</button>
      </div>
    </div>

    <!-- SUCCESS -->
    <div id="success-screen">
      <div class="confetti-row">🎉🏆🎊</div>
      <div class="check-circle">✅</div>
      <h2>Vote Recorded!</h2>
      <p id="success-detail"></p>
    </div>

    <!-- ADMIN -->
    <div class="admin-toggle">
      <button class="btn-ghost" onclick="toggleAdmin()">🔒 Admin</button>
    </div>
    <div id="admin-panel">
      <h3>Download Results</h3>
      <div class="admin-row">
        <input type="password" id="admin-pass" placeholder="Enter admin password"
          onkeydown="if(event.key==='Enter')verifyAdmin()">
        <button class="btn-admin" onclick="verifyAdmin()">Export Excel</button>
      </div>
      <div class="admin-error" id="admin-error">❌ Incorrect password.</div>
      <div class="vote-count" id="vote-count"></div>
      <button class="btn-reset" id="reset-btn" style="display:none" onclick="resetVotes()">🗑 Reset All Votes</button>
    </div>
  </main>
</div>

<script>
/* ── PARTICLES ─────────────────────────────────────────────────────────── */
(function(){
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);

  const COLORS=['rgba(245,197,24,.55)','rgba(0,193,112,.45)','rgba(255,255,255,.25)'];
  function mk(){
    return{
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
      r:Math.random()*2+.5,
      c:COLORS[Math.floor(Math.random()*COLORS.length)],
      life:Math.random()
    };
  }
  for(let i=0;i<90;i++)particles.push(mk());

  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.life+=.003;
      if(p.x<0||p.x>W||p.y<0||p.y>H){Object.assign(p,mk());p.x=Math.random()*W;p.y=Math.random()*H;}
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*(0.6+Math.sin(p.life*2)*.4),0,Math.PI*2);
      ctx.fillStyle=p.c;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── GROUPS DATA ─────────────────────────────────────────────────────────── */
const ADMIN_PASSWORD="WC2026Admin!"; // ← change to your own password

const GROUPS=[
  {id:"A",cls:"g-a",teams:[{flag:"🇲🇽",name:"Mexico"},{flag:"🇿🇦",name:"South Africa"},{flag:"🇰🇷",name:"Korea Republic"},{flag:"🇨🇿",name:"Czechia"}]},
  {id:"B",cls:"g-b",teams:[{flag:"🇨🇦",name:"Canada"},{flag:"🇧🇦",name:"Bosnia and Herzegovina"},{flag:"🇶🇦",name:"Qatar"},{flag:"🇨🇭",name:"Switzerland"}]},
  {id:"C",cls:"g-c",teams:[{flag:"🇧🇷",name:"Brazil"},{flag:"🇲🇦",name:"Morocco"},{flag:"🇭🇹",name:"Haiti"},{flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",name:"Scotland"}]},
  {id:"D",cls:"g-d",teams:[{flag:"🇺🇸",name:"USA"},{flag:"🇵🇾",name:"Paraguay"},{flag:"🇦🇺",name:"Australia"},{flag:"🇹🇷",name:"Türkiye"}]},
  {id:"E",cls:"g-e",teams:[{flag:"🇩🇪",name:"Germany"},{flag:"🇨🇼",name:"Curaçao"},{flag:"🇨🇮",name:"Côte d'Ivoire"},{flag:"🇪🇨",name:"Ecuador"}]},
  {id:"F",cls:"g-f",teams:[{flag:"🇳🇱",name:"Netherlands"},{flag:"🇯🇵",name:"Japan"},{flag:"🇸🇪",name:"Sweden"},{flag:"🇹🇳",name:"Tunisia"}]},
  {id:"G",cls:"g-g",teams:[{flag:"🇧🇪",name:"Belgium"},{flag:"🇪🇬",name:"Egypt"},{flag:"🇮🇷",name:"IR Iran"},{flag:"🇳🇿",name:"New Zealand"}]},
  {id:"H",cls:"g-h",teams:[{flag:"🇪🇸",name:"Spain"},{flag:"🇨🇻",name:"Cabo Verde"},{flag:"🇸🇦",name:"Saudi Arabia"},{flag:"🇺🇾",name:"Uruguay"}]},
  {id:"I",cls:"g-i",teams:[{flag:"🇫🇷",name:"France"},{flag:"🇸🇳",name:"Senegal"},{flag:"🇮🇶",name:"Iraq"},{flag:"🇳🇴",name:"Norway"}]},
  {id:"J",cls:"g-j",teams:[{flag:"🇦🇷",name:"Argentina"},{flag:"🇩🇿",name:"Algeria"},{flag:"🇦🇹",name:"Austria"},{flag:"🇯🇴",name:"Jordan"}]},
  {id:"K",cls:"g-k",teams:[{flag:"🇵🇹",name:"Portugal"},{flag:"🇨🇩",name:"Congo DR"},{flag:"🇺🇿",name:"Uzbekistan"},{flag:"🇨🇴",name:"Colombia"}]},
  {id:"L",cls:"g-l",teams:[{flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",name:"England"},{flag:"🇭🇷",name:"Croatia"},{flag:"🇬🇭",name:"Ghana"},{flag:"🇵🇦",name:"Panama"}]}
];

/* ── RENDER GROUPS ─────────────────────────────────────────────────────── */
const grid=document.getElementById("groups-grid");
GROUPS.forEach(g=>{
  const block=document.createElement("div");
  block.className="group-block";
  block.innerHTML=`<div class="group-header ${g.cls}">GROUP ${g.id}</div>`;
  g.teams.forEach(t=>{
    const lbl=document.createElement("label");
    lbl.className="team-option";
    lbl.innerHTML=`
      <input type="radio" name="team" value="${t.name}" onchange="onTeamChange(this)">
      <div class="radio-dot"></div>
      <span class="team-flag">${t.flag}</span>
      <span class="team-name">${t.name}</span>`;
    block.appendChild(lbl);
  });
  grid.appendChild(block);
});

function onTeamChange(radio){
  document.querySelectorAll(".team-option").forEach(el=>el.classList.remove("selected"));
  radio.closest(".team-option").classList.add("selected");
}

/* ── STORAGE ───────────────────────────────────────────────────────────── */
function getVotes(){
  try{return JSON.parse(localStorage.getItem("wc2026_votes")||"[]");}
  catch{return[];}
}
function saveVote(entry){
  const v=getVotes();v.push(entry);
  localStorage.setItem("wc2026_votes",JSON.stringify(v));
}

/* ── SUBMIT ────────────────────────────────────────────────────────────── */
function submitVote(){
  const first=document.getElementById("fan-firstname").value.trim();
  const sur=document.getElementById("fan-surname").value.trim();
  const radio=document.querySelector('input[name="team"]:checked');
  const errF=document.getElementById("err-fields");
  const errD=document.getElementById("err-duplicate");
  errF.style.display="none";errD.style.display="none";

  if(!first||!sur||!radio){errF.style.display="block";return;}

  const fullName=`${first} ${sur}`;
  const dup=getVotes().find(v=>v.name.toLowerCase()===fullName.toLowerCase());
  if(dup){errD.style.display="block";return;}

  saveVote({name:fullName,team:radio.value,timestamp:new Date().toLocaleString()});

  /* transition */
  const ps=document.getElementById("poll-screen");
  ps.style.transition="opacity .4s,transform .4s";
  ps.style.opacity="0";ps.style.transform="translateY(-20px)";
  setTimeout(()=>{
    ps.style.display="none";
    const ss=document.getElementById("success-screen");
    ss.style.display="block";
    document.getElementById("success-detail").textContent=
      `${fullName}, your vote for ${radio.value} has been recorded. Good luck! ⚽`;
  },400);
}

/* ── ADMIN ─────────────────────────────────────────────────────────────── */
function toggleAdmin(){
  const p=document.getElementById("admin-panel");
  const open=p.style.display==="block";
  p.style.display=open?"none":"block";
  if(!open){refreshAdminStats();}
}

function refreshAdminStats(){
  const votes=getVotes();
  document.getElementById("vote-count").innerHTML=
    `Total votes recorded: <span>${votes.length}</span>`;
  document.getElementById("reset-btn").style.display=votes.length?"block":"none";
}

function verifyAdmin(){
  const pass=document.getElementById("admin-pass").value;
  const errEl=document.getElementById("admin-error");
  if(pass!==ADMIN_PASSWORD){errEl.style.display="block";return;}
  errEl.style.display="none";
  exportExcel();
}

function resetVotes(){
  if(!confirm("Are you sure you want to delete ALL votes? This cannot be undone."))return;
  localStorage.removeItem("wc2026_votes");
  refreshAdminStats();
  alert("All votes have been reset.");
}

/* ── EXCEL EXPORT ──────────────────────────────────────────────────────── */
function exportExcel(){
  const votes=getVotes();
  if(!votes.length){alert("No votes recorded yet.");return;}

  const wb=XLSX.utils.book_new();

  /* Sheet 1 – Responses */
  const rows=[["#","First & Surname","Team Supported","Submitted At"]];
  votes.forEach((v,i)=>rows.push([i+1,v.name,v.team,v.timestamp]));
  const ws1=XLSX.utils.aoa_to_sheet(rows);
  ws1["!cols"]=[{wch:5},{wch:30},{wch:26},{wch:24}];
  const hs={font:{bold:true,color:{rgb:"0A0A0A"}},fill:{fgColor:{rgb:"F5C518"}},alignment:{horizontal:"center"}};
  ["A1","B1","C1","D1"].forEach(r=>{if(ws1[r])ws1[r].s=hs;});
  XLSX.utils.book_append_sheet(wb,ws1,"Responses");

  /* Sheet 2 – Team Totals */
  const tot={};
  votes.forEach(v=>{tot[v.team]=(tot[v.team]||0)+1;});
  const sorted=Object.entries(tot).sort((a,b)=>b[1]-a[1]);
  const trows=[["Rank","Team","Total Votes"]];
  sorted.forEach(([t,c],i)=>trows.push([i+1,t,c]));
  const ws2=XLSX.utils.aoa_to_sheet(trows);
  ws2["!cols"]=[{wch:6},{wch:28},{wch:14}];
  ["A1","B1","C1"].forEach(r=>{if(ws2[r])ws2[r].s=hs;});
  XLSX.utils.book_append_sheet(wb,ws2,"Team Totals");

  const date=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`WC2026_Poll_Results_${date}.xlsx`);
}
</script>
</body>
</html>
